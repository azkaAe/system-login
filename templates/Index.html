<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | Secure Access</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 1px solid #00ff00;
            padding: 50px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        p {
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        input {
            background: #111;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            width: 200px;
            font-size: 1.2rem;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px #00ff00;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #008800;
            color: #fff;
        }

        .status-msg {
            margin-top: 25px;
            font-weight: bold;
            min-height: 20px;
        }

        .error {
            color: #ff0000;
            text-shadow: 0 0 5px #ff0000;
        }

        /* Menghilangkan panah di input number jika masih ingin pakai type number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>[ INITIALIZING SYSTEM ]</h1>

        <form method="POST">
            <p>Insert Secret Code</p>
            <input type="password" name="code_input" pattern="\[0-9]*\" inputmode="numeric" required autocomplete="off"
                maxlength="6"><br>

            <button type="submit" name="aksi" value="set_code">START SYNC</button>
        </form>

        <div class="status-msg">
            {% if msg %}
            <span class="error">>> {{ msg }}</span>
            {% endif %}
        </div>
    </div>

    <script>
        // Skenario tambahan: Fokus otomatis ke input saat halaman dimuat
        window.onload = function () {
            document.getElementsByName('code_input')[0].focus();
        };
    </script>
</body>

</html>
