<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ACCESS GRANTED | Decrypting...</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .loading-box {
            text-align: center;
        }

        .progress-bar {
            width: 300px;
            border: 1px solid #00ff00;
            height: 10px;
            margin-top: 15px;
        }

        .progress-fill {
            background: #00ff00;
            height: 100%;
            width: 0%;
        }

        #secret-content {
            display: none;
            text-align: center;
            border: 1px solid #00ff00;
            padding: 40px;
        }

        .btn-exit {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div id="loader" class="loading-box">
        <div id="status">INITIALIZING DECRYPTION...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
    </div>

    <div id="secret-content">
        <h1 style="color: #fff;">[ ACCESS GRANTED ]</h1>
        <p>SECRET DATA RETRIEVED:</p>
        <h2 style="background: #004400; display: inline-block; padding: 10px;">SELAMAT, ANDA KENA PRANK.</h2>
        <br>
        <button class="btn-exit" onclick="exitSystem()">EXIT SYSTEM</button>
    </div>

    <script>
        const fill = document.getElementById('fill');
        const statusText = document.getElementById('status');
        const messages = ["BYPASSING...", "DECRYPTING...", "FETCHING DATA...", "SUCCESS!"];
        let width = 0;


        const interval = setInterval(() => {
            width += 2;
            fill.style.width = width + '%';

            if (width == 30) statusText.innerText = messages[0];
            if (width == 60) statusText.innerText = messages[1];
            if (width == 90) statusText.innerText = messages[2];

            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('secret-content').style.display = 'block';
            }
        }, 50);


        function exitSystem() {

            document.body.innerHTML = "<h1 style='color:red;'>[ TERMINATING DATA... ]</h1>";

            setTimeout(() => {
                fetch('/logout').then(() => {
                    window.location.href = "about:blank";
                    window.close();
                });
            }, 1500);
        }
    </script>
</body>

</html>
